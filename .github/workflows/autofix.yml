name: autofix.ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    name: Run Biome autofix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Biome
        run: bunx biome check --write --unsafe
